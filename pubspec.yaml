
name: notebook_app
description: Simple notebook MVP
publish_to: 'none'
version: 1.0.0

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.3+1
  sqflite_common_ffi: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.2
  pdf: ^3.10.7
  printing: ^5.12.0
  image_picker: ^1.0.7
  file_picker: ^8.1.2
  image: any

flutter:
  uses-material-design: true

dev_dependencies:
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  windows:
    generate: true
    image_path: "assets/icon.png"
